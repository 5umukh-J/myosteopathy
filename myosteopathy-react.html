.btn-ghost {

.modal-overlay {

@keyframes fadeIn    { from { opacity: 0 }                       to { opacity: 1 } }
@keyframes fadeUp    { from { opacity: 0; transform: translateY(32px) } to { opacity: 1; transform: translateY(0) } }
@keyframes fadeDown  { from { opacity: 0; transform: translateY(-20px) } to { opacity: 1; transform: translateY(0) } }
@keyframes scaleIn   { from { opacity: 0; transform: scale(.92) } to { opacity: 1; transform: scale(1) } }
@keyframes slideUp   { from { opacity: 0; transform: translateY(40px) scale(.98) } to { opacity: 1; transform: translateY(0) scale(1) } }
@keyframes slideLeft { from { opacity: 0; transform: translateX(30px) } to { opacity: 1; transform: translateX(0) } }
@keyframes slideRight{ from { opacity: 0; transform: translateX(-30px) } to { opacity: 1; transform: translateX(0) } }
@keyframes pulse     { 0%,100% { opacity: 1; transform: scale(1) } 50% { opacity: .4; transform: scale(1.5) } }
@keyframes bounce    { 0%,100% { transform: translateY(0) } 50% { transform: translateY(8px) } }
@keyframes shimmer   { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
@keyframes spin      { to { transform: rotate(360deg) } }
@keyframes meshShift { from { filter: hue-rotate(0deg) brightness(1) } to { filter: hue-rotate(10deg) brightness(1.06) } }
@keyframes float     { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-12px) } }
@keyframes pinDrop   { from { transform: translate(-50%,-200%); opacity: 0 } to { transform: translate(-50%,-100%); opacity: 1 } }

.reveal-right { opacity: 0; transform: translateX(28px); transition: opacity .7s ease, transform .7s cubic-bezier(.2,.8,.4,1); }
.reveal-right.visible { opacity: 1; transform: translateX(0); }

// Scroll-triggered reveal
function useReveal(threshold = 0.12) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.unobserve(el); } },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
}

// Staggered children reveal
function useStaggerReveal(count, threshold = 0.1) {
  const ref = useRef(null);
  const [visibleCount, setVisibleCount] = useState(0);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          let i = 0;
          const interval = setInterval(() => {
            setVisibleCount(prev => { const next = prev + 1; if (next >= count) clearInterval(interval); return next; });
            i++;
            if (i >= count) clearInterval(interval);
          }, 120);
          obs.unobserve(el);
        }
      },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [count, threshold]);
  return [ref, visibleCount];
}

// Counter animation
function useCounter(target, duration = 1800, start = false) {
  const [value, setValue] = useState(0);
  useEffect(() => {
    if (!start) return;
    let startTime = null;
    const step = (timestamp) => {
      if (!startTime) startTime = timestamp;
      const progress = Math.min((timestamp - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setValue(Math.floor(eased * target));
      if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target, duration, start]);
  return value;
}

// Google Maps loader hook
function useGoogleMaps() {
  const [loaded, setLoaded] = useState(!!window.google?.maps);

  useEffect(() => {
    if (window.google?.maps) { setLoaded(true); return; }
    const existingScript = document.getElementById('gmaps-script');
    if (existingScript) {
      existingScript.addEventListener('load', () => setLoaded(true));
      return;
    }
    const script = document.createElement('script');
    script.id = 'gmaps-script';
    script.src = `https://maps.googleapis.com/maps/api/js?key=AIzaSyDbECSHdq-t4GWfJDbDsqvNg_FG6shybQg&libraries=places&loading=async`;
    script.async = true;
    script.defer = true;
    script.onload = () => setLoaded(true);
    script.onerror = () => console.error('Google Maps failed to load');
    document.head.appendChild(script);
  }, []);

  return loaded;
}

// Typing animation
function useTyping(words, speed = 80, pause = 2000) {
  const [text, setText] = useState('');
  const [wordIdx, setWordIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [deleting, setDeleting] = useState(false);

  useEffect(() => {
    const word = words[wordIdx];
    let timeout;
    if (!deleting && charIdx < word.length) {
      timeout = setTimeout(() => setCharIdx(c => c + 1), speed);
    } else if (!deleting && charIdx === word.length) {
      timeout = setTimeout(() => setDeleting(true), pause);
    } else if (deleting && charIdx > 0) {
      timeout = setTimeout(() => setCharIdx(c => c - 1), speed / 2);
    } else if (deleting && charIdx === 0) {
      setDeleting(false);
      setWordIdx(i => (i + 1) % words.length);
    }
    setText(word.slice(0, charIdx));
    return () => clearTimeout(timeout);
  }, [charIdx, deleting, wordIdx, words, speed, pause]);

  return text;
}

const AuthContext = createContext(null);

function AuthProvider({ children }) {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('mo_user') || 'null'); } catch { return null; }
  });
  const [bookings, setBookings] = useState(() => {
    try { return JSON.parse(localStorage.getItem('mo_bookings') || '[]'); } catch { return []; }
  });
  const [savedClinics, setSavedClinics] = useState(() => {
    try { return JSON.parse(localStorage.getItem('mo_saved') || '[]'); } catch { return []; }
  });

  useEffect(() => {
    localStorage.setItem('mo_user', JSON.stringify(user));
  }, [user]);
  useEffect(() => {
    localStorage.setItem('mo_bookings', JSON.stringify(bookings));
  }, [bookings]);
  useEffect(() => {
    localStorage.setItem('mo_saved', JSON.stringify(savedClinics));
  }, [savedClinics]);

  const login = (email, password) => {
    // Mock auth — in production connect to real backend
    const mockUser = {
      id: 'u_' + Date.now(),
      email,
      name: email.split('@')[0].replace(/\./g,' ').replace(/^\w/,c=>c.toUpperCase()),
      role: 'patient',
      avatar: email[0].toUpperCase(),
      joinedDate: new Date().toISOString()
    };
    setUser(mockUser);
    return mockUser;
  };

  const register = (name, email, password, role = 'patient') => {
    const newUser = {
      id: 'u_' + Date.now(),
      name,
      email,
      role,
      avatar: name[0].toUpperCase(),
      joinedDate: new Date().toISOString()
    };
    setUser(newUser);
    return newUser;
  };

  const logout = () => setUser(null);

  const addBooking = (booking) => {
    const newBooking = { ...booking, id: 'b_' + Date.now(), status: 'confirmed', createdAt: new Date().toISOString() };
    setBookings(prev => [newBooking, ...prev]);
    return newBooking;
  };

  const cancelBooking = (id) => {
    setBookings(prev => prev.map(b => b.id === id ? { ...b, status: 'cancelled' } : b));
  };

  const toggleSaved = (clinicId) => {
    setSavedClinics(prev =>
      prev.includes(clinicId) ? prev.filter(id => id !== clinicId) : [...prev, clinicId]
    );
  };

  const isSaved = (clinicId) => savedClinics.includes(clinicId);

  return (
    <AuthContext.Provider value={{ user, login, register, logout, bookings, addBooking, cancelBooking, savedClinics, toggleSaved, isSaved }}>
      {children}
    </AuthContext.Provider>
  );
}

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);

  const toast = (msg, type = 'info') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3200);
  };

  return (
    <ToastContext.Provider value={toast}>
      {children}
      <div style={{ position:'fixed', bottom:32, right:32, zIndex:3000, display:'flex', flexDirection:'column', gap:10 }}>
        {toasts.map(t => (
          <div key={t.id} className={`toast show toast-${t.type}`}>

            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }

          </h2>
          <p style={{fontSize:'.875rem',color:'var(--gray-3)'}}>
            {mode==='login' ? 'Sign in to manage your bookings and saved clinics' : 'Join thousands finding better osteopathic care'}
          </p>
        </div>

        <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:16}}>
          {mode === 'register' && field('name', 'Full Name', 'text', 'Dr. Jane Smith')}
          {field('email', 'Email Address', 'email', 'you@example.com')}
          {field('password', 'Password', 'password', '••••••••')}

          {mode === 'register' && (
            <div className="form-group">
              <label className="form-label">I am a…</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                {[
                  { value:'patient', icon:'🏥', label:'Patient', desc:'Find & book care' },
                  { value:'practitioner', icon:'🩺', label:'Practitioner', desc:'List my practice' },
                ].map(opt => (
                  <button key={opt.value} type="button"
                    onClick={() => setForm(f=>({...f,role:opt.value}))}
                    style={{
                      padding:'14px 12px', textAlign:'left',
                      border: form.role===opt.value ? '2px solid var(--teal)' : '1.5px solid var(--gray-2)',
                      borderRadius:10, background: form.role===opt.value ? 'var(--teal-dim)' : 'white',
                      cursor:'pointer', transition:'all .2s',
                    }}
                  >
                    <div style={{fontSize:'1.3rem',marginBottom:4}}>{opt.icon}</div>
                    <div style={{fontWeight:600,fontSize:'.9rem',color:'var(--navy)'}}>{opt.label}</div>
                    <div style={{fontSize:'.75rem',color:'var(--gray-3)'}}>{opt.desc}</div>
                  </button>
                ))}
              </div>
            </div>
          )}

          <button type="submit" className="btn-primary" style={{
            justifyContent:'center', marginTop:8,
            opacity: loading ? .7 : 1,
            pointerEvents: loading ? 'none' : 'auto',
          }}>
            {loading ? (
              <span style={{width:18,height:18,border:'2px solid rgba(255,255,255,.4)',borderTopColor:'white',borderRadius:'50%',animation:'spin .7s linear infinite',display:'inline-block'}}/>
            ) : null}
            {loading ? 'Please wait…' : mode==='login' ? 'Sign In' : 'Create Account'}
          </button>
        </form>

        <p style={{textAlign:'center',marginTop:20,fontSize:'.875rem',color:'var(--gray-3)'}}>
          {mode==='login' ? "Don't have an account? " : 'Already have an account? '}
          <button onClick={() => onSwitch(mode==='login'?'register':'login')}
            style={{color:'var(--teal)',fontWeight:600,textDecoration:'underline'}}>
            {mode==='login' ? 'Sign up free' : 'Sign in'}
          </button>
        </p>

        <p style={{textAlign:'center',marginTop:12,fontSize:'.72rem',color:'var(--gray-3)',lineHeight:1.6}}>
          By continuing, you agree to our Terms of Service and Privacy Policy.
        </p>
      </div>
    </div>
  );
}

function getDaysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}
function getFirstDayOfMonth(year, month) {
  return new Date(year, month, 1).getDay();
}
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS   = ['Su','Mo','Tu','We','Th','Fr','Sa'];

function BookingModal({ clinic, onClose }) {
  const today = new Date();
  const [year, setYear]   = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());
  const [day, setDay]     = useState(null);
  const [slot, setSlot]   = useState(null);
  const [reason, setReason] = useState('');
  const [step, setStep]   = useState(1); // 1=date, 2=time, 3=confirm, 4=done
  const [showAuth, setShowAuth] = useState(false);
  const [authMode, setAuthMode] = useState('login');
  const { user, addBooking } = useAuth();
  const toast = useToast();

  const prevMonth = () => { if (month === 0) { setYear(y=>y-1); setMonth(11); } else setMonth(m=>m-1); setDay(null); };
  const nextMonth = () => { if (month === 11) { setYear(y=>y+1); setMonth(0); } else setMonth(m=>m+1); setDay(null); };

  const days = getDaysInMonth(year, month);
  const firstDay = getFirstDayOfMonth(year, month);

  const isDisabled = (d) => {
    const date = new Date(year, month, d);
    if (date < today) return true;
    if (date.getDay() === 0) return true; // no Sundays
    return false;
  };

  const handleConfirm = () => {
    if (!user) { setShowAuth(true); return; }
    const booking = addBooking({
      clinicId: clinic.id,
      clinicName: clinic.name,
      clinicAddress: clinic.address,
      date: `${MONTHS[month]} ${day}, ${year}`,
      time: slot,
      reason: reason || 'General consultation',
      practitioner: clinic.practitioners[0]?.name,
    });
    setStep(4);
  };

  const selectedDate = day ? `${MONTHS[month]} ${day}, ${year}` : null;

  if (showAuth) return <AuthModal mode={authMode} onClose={() => setShowAuth(false)} onSwitch={setAuthMode} />;

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal-box" style={{maxWidth:560, padding:'32px'}}>
        <button className="modal-close" onClick={onClose}>×</button>

        {/* Progress bar */}
        <div style={{display:'flex',gap:6,marginBottom:28}}>
          {[1,2,3].map(s => (
            <div key={s} style={{
              height:3, flex:1, borderRadius:2,
              background: s <= step-1 ? 'var(--teal)' : s===step ? 'var(--gold)' : 'var(--gray-2)',
              transition:'background .4s',
            }}/>
          ))}
        </div>

        {/* STEP 1 — DATE */}
        {step === 1 && (
          <div style={{animation:'fadeUp .35s ease'}}>
            <h3 style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.5rem',fontWeight:600,color:'var(--navy)',marginBottom:4}}>
              Choose a date
            </h3>
            <p style={{fontSize:'.875rem',color:'var(--gray-3)',marginBottom:24}}>{clinic.name}</p>

            {/* Month nav */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <button onClick={prevMonth} style={{
                width:36, height:36, borderRadius:'50%',
                background:'var(--gray-1)', color:'var(--navy)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:'1rem', transition:'background .2s',
              }}
              onMouseEnter={e=>e.currentTarget.style.background='var(--gray-2)'}
              onMouseLeave={e=>e.currentTarget.style.background='var(--gray-1)'}
              >‹</button>
              <div style={{fontWeight:600,color:'var(--navy)'}}>{MONTHS[month]} {year}</div>
              <button onClick={nextMonth} style={{
                width:36, height:36, borderRadius:'50%',
                background:'var(--gray-1)', color:'var(--navy)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:'1rem', transition:'background .2s',
              }}
              onMouseEnter={e=>e.currentTarget.style.background='var(--gray-2)'}
              onMouseLeave={e=>e.currentTarget.style.background='var(--gray-1)'}
              >›</button>
            </div>

            {/* Calendar grid */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
              {DAYS.map(d => (
                <div key={d} style={{textAlign:'center',fontSize:'.75rem',fontWeight:600,color:'var(--gray-3)',padding:'4px 0'}}>{d}</div>
              ))}
              {Array.from({length: firstDay}).map((_,i) => <div key={'e'+i}/>)}
              {Array.from({length: days}).map((_,i) => {
                const d = i + 1;
                const disabled = isDisabled(d);
                const selected = d === day;
                return (
                  <button key={d} disabled={disabled} onClick={() => setDay(d)} style={{
                    aspectRatio:'1',
                    borderRadius:10,
                    fontWeight: selected ? 700 : 400,
                    fontSize:'.875rem',
                    background: selected ? 'var(--teal)' : 'transparent',
                    color: selected ? 'white' : disabled ? 'var(--gray-2)' : 'var(--navy)',
                    cursor: disabled ? 'not-allowed' : 'pointer',
                    transition:'all .15s',
                    border: selected ? 'none' : '1.5px solid transparent',
                  }}
                  onMouseEnter={e=>{if(!disabled&&!selected)e.currentTarget.style.background='var(--gray-1)'}}
                  onMouseLeave={e=>{if(!disabled&&!selected)e.currentTarget.style.background='transparent'}}
                  >{d}</button>
                );
              })}
            </div>

            <button disabled={!day} onClick={() => setStep(2)} className="btn-primary" style={{
              justifyContent:'center', width:'100%', marginTop:24,
              opacity: day ? 1 : .5, pointerEvents: day ? 'auto' : 'none',
            }}>
              Continue →
            </button>
          </div>
        )}

        {/* STEP 2 — TIME */}
        {step === 2 && (
          <div style={{animation:'fadeUp .35s ease'}}>
            <button onClick={()=>setStep(1)} style={{color:'var(--teal)',fontSize:'.875rem',fontWeight:500,marginBottom:16,display:'flex',alignItems:'center',gap:4}}>
              ← {selectedDate}
            </button>
            <h3 style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.5rem',fontWeight:600,color:'var(--navy)',marginBottom:4}}>
              Choose a time
            </h3>
            <p style={{fontSize:'.875rem',color:'var(--gray-3)',marginBottom:20}}>Available slots for {selectedDate}</p>

            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,maxHeight:280,overflowY:'auto'}}>
              {TIME_SLOTS.map(s => {
                const unavail = ['9:00 AM','11:30 AM','2:00 PM','4:30 PM'].includes(s);
                const selected = s === slot;
                return (
                  <button key={s} disabled={unavail} onClick={()=>setSlot(s)} style={{
                    padding:'10px 6px', borderRadius:8,
                    fontSize:'.85rem', fontWeight: selected ? 600 : 400,
                    background: selected ? 'var(--teal)' : unavail ? 'var(--gray-1)' : 'white',
                    color: selected ? 'white' : unavail ? 'var(--gray-2)' : 'var(--navy)',
                    border: selected ? 'none' : '1.5px solid var(--gray-2)',
                    cursor: unavail ? 'not-allowed' : 'pointer',
                    textDecoration: unavail ? 'line-through' : 'none',
                    transition:'all .15s',
                    position:'relative',
                  }}>
                    {s}
                    {unavail && <span style={{fontSize:'.65rem',display:'block',color:'var(--gray-3)'}}>Booked</span>}
                  </button>
                );
              })}
            </div>

            <div style={{marginTop:20}}>
              <label className="form-label">Reason for visit (optional)</label>
              <textarea className="form-input" rows={2} placeholder="e.g. Lower back pain for 3 weeks…"
                value={reason} onChange={e=>setReason(e.target.value)}
                style={{resize:'none',marginTop:6}}/>
            </div>

            <button disabled={!slot} onClick={()=>setStep(3)} className="btn-primary" style={{
              justifyContent:'center', width:'100%', marginTop:20,
              opacity: slot ? 1 : .5, pointerEvents: slot ? 'auto' : 'none',
            }}>
              Review Booking →
            </button>
          </div>
        )}

        {/* STEP 3 — CONFIRM */}
        {step === 3 && (
          <div style={{animation:'fadeUp .35s ease'}}>
            <h3 style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.5rem',fontWeight:600,color:'var(--navy)',marginBottom:20}}>
              Confirm your booking
            </h3>
            <div style={{
              background:'var(--cream)', borderRadius:14, padding:20,
              display:'flex', flexDirection:'column', gap:14, marginBottom:20,
            }}>
              {[
                { icon:'🏥', label:'Clinic', value:clinic.name },
                { icon:'📍', label:'Address', value:clinic.address },
                { icon:'👨‍⚕️', label:'Practitioner', value:clinic.practitioners[0]?.name },
                { icon:'📅', label:'Date', value:selectedDate },
                { icon:'⏰', label:'Time', value:slot },
                { icon:'📝', label:'Reason', value:reason || 'General consultation' },
              ].map(item => (
                <div key={item.label} style={{display:'flex',alignItems:'flex-start',gap:12}}>
                  <span style={{fontSize:'1rem',flexShrink:0}}>{item.icon}</span>
                  <div>
                    <div style={{fontSize:'.72rem',fontWeight:600,color:'var(--gray-3)',textTransform:'uppercase',letterSpacing:'.08em'}}>{item.label}</div>
                    <div style={{fontSize:'.9rem',color:'var(--navy)',fontWeight:500}}>{item.value}</div>
                  </div>
                </div>
              ))}
            </div>
            {!user && (
              <div style={{
                background:'rgba(200,169,110,.08)', border:'1px solid rgba(200,169,110,.3)',
                borderRadius:10, padding:14, marginBottom:16, fontSize:'.85rem', color:'#7a5c1e',
              }}>
                ℹ️ You'll need to sign in to confirm your booking and manage appointments.
              </div>
            )}
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setStep(2)} className="btn-outline" style={{flex:1,justifyContent:'center'}}>← Back</button>
              <button onClick={handleConfirm} className="btn-primary" style={{flex:2,justifyContent:'center'}}>
                {user ? 'Confirm Booking' : 'Sign In & Book'}
              </button>
            </div>
          </div>
        )}

        {/* STEP 4 — DONE */}
        {step === 4 && (
          <div style={{textAlign:'center',animation:'scaleIn .4s var(--transition-spring)',padding:'20px 0'}}>
            <div style={{
              width:72, height:72,
              background:'linear-gradient(135deg,#16a34a,#22c55e)',
              borderRadius:'50%',
              display:'flex', alignItems:'center', justifyContent:'center',
              margin:'0 auto 20px',
              boxShadow:'0 8px 32px rgba(22,163,74,.3)',
              animation:'float 3s ease-in-out infinite',
            }}>
              <svg width="32" height="32" fill="white" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12" stroke="white" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
              </svg>
            </div>
            <h3 style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.8rem',fontWeight:600,color:'var(--navy)',marginBottom:8}}>
              Booking Confirmed!
            </h3>
            <p style={{color:'var(--gray-4)',marginBottom:6}}>
              <strong>{selectedDate}</strong> at <strong>{slot}</strong>
            </p>
            <p style={{color:'var(--gray-3)',fontSize:'.875rem',marginBottom:28}}>
              {clinic.name} · A confirmation has been noted in your account.
            </p>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button onClick={onClose} className="btn-outline">Close</button>
              <button onClick={()=>{onClose();window.location='/dashboard/bookings'}} className="btn-primary">
                View Bookings
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Stars({ rating }) {
  return (
    <div className="stars" style={{display:'inline-flex',gap:2}}>
      {[1,2,3,4,5].map(i => (
        <span key={i} style={{
          color: i <= Math.round(rating) ? '#f59e0b' : 'var(--gray-2)',
          fontSize:'.85rem',
        }}>★</span>
      ))}
    </div>
  );
}

  const handleSave = (e) => {
    e.stopPropagation();
    toggleSaved(clinic.id);

  return (
    <>
      <div
        onClick={() => onSelect?.(clinic.id)}

            padding:'8px 14px',

            borderRadius:8, fontSize:'.8rem', fontWeight:600,
            transition:'background .2s',

          onMouseLeave={e=>e.currentTarget.style.background='var(--gold)'}
          >
            📅 Book
          </button>
          <Link to={`/clinic/${clinic.slug}`} onClick={e=>e.stopPropagation()} style={{
            display:'flex', alignItems:'center', gap:5,
            padding:'8px 14px',
            border:'1.5px solid var(--gray-2)', color:'var(--gray-4)',
            borderRadius:8, fontSize:'.8rem', fontWeight:600,
            transition:'all .2s', marginLeft:'auto',
          }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--teal)';e.currentTarget.style.color='var(--teal)'}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--gray-2)';e.currentTarget.style.color='var(--gray-4)'}}
          >
            Profile →
          </Link>
        </div>
      </div>

      {bookingOpen && <BookingModal clinic={clinic} onClose={() => setBookingOpen(false)} />}
    </>
  );
}

function MapView({ clinics, selectedId, onSelect }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markersRef = useRef([]);
  const infoWindowRef = useRef(null);
  const loaded = useGoogleMaps();
  const [mapError, setMapError] = useState(false);

  window.gm_authFailure = () => setMapError(true);

  const MAP_STYLES = [
    {featureType:'all',elementType:'geometry',stylers:[{color:'#f0ece6'}]},
    {featureType:'water',elementType:'geometry',stylers:[{color:'#c8dde8'}]},
    {featureType:'road',elementType:'geometry',stylers:[{color:'#ffffff'}]},
    {featureType:'road.arterial',elementType:'geometry',stylers:[{color:'#e8e4de'}]},
    {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#d4e8c8'}]},
    {featureType:'transit',elementType:'geometry',stylers:[{color:'#e2ddd6'}]},
    {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
    {featureType:'administrative',elementType:'labels.text.fill',stylers:[{color:'#5a5650'}]},
    {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#9a9488'}]},
    {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#1a6b7a'}]},
  ];

  useEffect(() => {
    if (!loaded || !mapRef.current || mapInstanceRef.current) return;
    try {
      const map = new window.google.maps.Map(mapRef.current, {
        center: { lat: 51.510, lng: -0.1280 },
        zoom: 13,
        styles: MAP_STYLES,
        disableDefaultUI: true,
        zoomControl: true,
        zoomControlOptions: { position: window.google.maps.ControlPosition.RIGHT_TOP },
      });
      mapInstanceRef.current = map;
      infoWindowRef.current = new window.google.maps.InfoWindow();

      markersRef.current = clinics.map((clinic, i) => {
        const marker = new window.google.maps.Marker({
          position: { lat: clinic.lat, lng: clinic.lng },
          map,
          label: { text: String(i+1), color:'#ffffff', fontSize:'12px', fontWeight:'700' },
          icon: {
            path: 'M 0,-18 C -6,-18 -10,-12 -10,-6 C -10,3 0,14 0,14 C 0,14 10,3 10,-6 C 10,-12 6,-18 0,-18 Z',
            fillColor: '#1a6b7a', fillOpacity:1, strokeColor:'#fff', strokeWeight:2,
            scale: 1.5, labelOrigin: new window.google.maps.Point(0,-6),
          },
          title: clinic.name,
          animation: window.google.maps.Animation.DROP,
        });
        marker.addListener('click', () => onSelect(clinic.id));
        return marker;
      });
    } catch(e) { setMapError(true); }
  }, [loaded, clinics]);

  // Update markers when selection changes
  useEffect(() => {
    if (!markersRef.current.length || !window.google) return;
    markersRef.current.forEach((marker, i) => {
      const isActive = clinics[i]?.id === selectedId;
      marker.setIcon({
        path:'M 0,-18 C -6,-18 -10,-12 -10,-6 C -10,3 0,14 0,14 C 0,14 10,3 10,-6 C 10,-12 6,-18 0,-18 Z',
        fillColor: isActive ? '#c8a96e' : '#1a6b7a',
        fillOpacity:1, strokeColor:'#fff', strokeWeight:2,
        scale: isActive ? 1.9 : 1.5,
        labelOrigin: new window.google.maps.Point(0,-6),
      });
      marker.setZIndex(isActive ? 999 : 1);
    });

    const activeClinic = clinics.find(c => c.id === selectedId);
    const activeIdx = clinics.findIndex(c => c.id === selectedId);
    if (activeClinic && mapInstanceRef.current) {
      mapInstanceRef.current.panTo({ lat: activeClinic.lat, lng: activeClinic.lng });
      if (mapInstanceRef.current.getZoom() < 14) mapInstanceRef.current.setZoom(14);
      if (infoWindowRef.current && markersRef.current[activeIdx]) {
        infoWindowRef.current.close();
        infoWindowRef.current.setContent(`
          <div style="font-family:DM Sans,sans-serif;padding:4px 6px;min-width:190px;">
            <div style="font-weight:700;color:#0d1f35;font-size:.9rem;margin-bottom:4px">${activeClinic.name}</div>
            <div style="color:#5a5650;font-size:.78rem;margin-bottom:6px">${activeClinic.address}</div>
            <div style="color:#1a6b7a;font-size:.78rem;font-weight:600">${activeClinic.distance} · ⭐ ${activeClinic.rating}</div>
            <a href="/clinic/${activeClinic.slug}" style="display:inline-block;margin-top:8px;padding:5px 12px;background:#1a6b7a;color:white;border-radius:6px;font-size:.75rem;font-weight:600;text-decoration:none;">View Profile →</a>
          </div>
        `);
        infoWindowRef.current.open(mapInstanceRef.current, markersRef.current[activeIdx]);
      }
    }
  }, [selectedId, clinics]);

  if (mapError) return (
    <div style={{
      width:'100%', height:'100%', borderRadius:'var(--radius-lg)',
      background:'linear-gradient(135deg,#f0ece6,#e8e4de)',
      display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center',
      padding:32, textAlign:'center',
    }}>
      <div style={{fontSize:'2rem',marginBottom:12}}>🗺️</div>
      <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.2rem',fontWeight:600,color:'var(--navy)',marginBottom:8}}>
        Map requires a live domain
      </div>
      <p style={{fontSize:'.85rem',color:'var(--gray-4)',lineHeight:1.6,maxWidth:280}}>
        Add your domain to the API key's allowed referrers in Google Cloud Console to enable the live map.
      </p>
    </div>
  );

  if (!loaded) return (
    <div style={{
      width:'100%', height:'100%', borderRadius:'var(--radius-lg)',
      background:'var(--gray-1)', display:'flex',
      alignItems:'center', justifyContent:'center', flexDirection:'column', gap:12,
    }}>
      <div style={{width:36,height:36,border:'3px solid var(--gray-2)',borderTopColor:'var(--teal)',borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
      <span style={{fontSize:'.85rem',color:'var(--gray-3)'}}>Loading map…</span>
    </div>
  );

  return <div ref={mapRef} style={{width:'100%',height:'100%',borderRadius:'var(--radius-lg)'}} />;
}

function FindPractitioner() {
  const [params] = useSearchParams();
  const [search, setSearch] = useState(params.get('loc') || 'London, UK');
  const [speciality, setSpeciality] = useState(params.get('spec') || '');
  const [radius, setRadius] = useState('10');
  const [view, setView] = useState('split'); // 'list' | 'map' | 'split'
  const [selectedId, setSelectedId] = useState(CLINICS[0]?.id);
  const [filtered, setFiltered] = useState(CLINICS);
  const [sortBy, setSortBy] = useState('distance');
  const [openOnly, setOpenOnly] = useState(false);

  useEffect(() => {
    let result = [...CLINICS];
    if (speciality) result = result.filter(c => c.conditionTags.some(t => t.toLowerCase().includes(speciality.toLowerCase())));
    if (openOnly) result = result.filter(c => c.openNow);
    if (sortBy === 'rating') result.sort((a,b) => b.rating - a.rating);
    else if (sortBy === 'reviews') result.sort((a,b) => b.reviews - a.reviews);
    setFiltered(result);
    if (result.length) setSelectedId(result[0].id);
  }, [speciality, openOnly, sortBy]);

  return (
    <div className="page" style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      {/* Search bar */}
      <div style={{
        padding:'16px 32px',
        background:'white',
        borderBottom:'1px solid var(--gray-2)',
        display:'flex', alignItems:'center', gap:12, flexWrap:'wrap',
        boxShadow:'0 2px 12px rgba(0,0,0,.06)',
        zIndex:10,
      }}>
        {/* Location */}
        <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--gray-1)',borderRadius:10,padding:'10px 14px',flex:2,minWidth:180}}>
          <svg width="15" height="15" fill="none" stroke="var(--teal)" strokeWidth="2" viewBox="0 0 24 24">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/>
          </svg>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="City, postcode or area…"
            style={{background:'transparent',fontSize:'.9rem',color:'var(--text)',flex:1}}/>
        </div>

        {/* Speciality */}
        <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--gray-1)',borderRadius:10,padding:'10px 14px',flex:1.5,minWidth:140}}>
          <svg width="14" height="14" fill="none" stroke="var(--teal)" strokeWidth="2" viewBox="0 0 24 24">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
          </svg>
          <select value={speciality} onChange={e=>setSpeciality(e.target.value)}
            style={{background:'transparent',fontSize:'.9rem',cursor:'pointer',appearance:'none',flex:1,color:speciality?'var(--text)':'var(--gray-3)'}}>
            <option value="">All conditions</option>
            {CONDITIONS.map(c=><option key={c.slug} value={c.name}>{c.name}</option>)}
          </select>
        </div>

        {/* Radius */}
        <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--gray-1)',borderRadius:10,padding:'10px 14px'}}>
          <select value={radius} onChange={e=>setRadius(e.target.value)}
            style={{background:'transparent',fontSize:'.9rem',cursor:'pointer',appearance:'none',color:'var(--text)'}}>
            <option value="5">Within 5 mi</option>
            <option value="10">Within 10 mi</option>
            <option value="25">Within 25 mi</option>
            <option value="50">Within 50 mi</option>
          </select>
        </div>

        {/* Open now toggle */}
        <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:'.875rem',color:'var(--gray-4)',userSelect:'none'}}>
          <div style={{
            width:38, height:22, borderRadius:11, position:'relative', flexShrink:0,
            background: openOnly ? 'var(--teal)' : 'var(--gray-2)',
            transition:'background .25s',
          }} onClick={()=>setOpenOnly(p=>!p)}>
            <div style={{
              position:'absolute', top:3, left: openOnly ? 19 : 3,
              width:16, height:16, borderRadius:'50%', background:'white',
              transition:'left .25s', boxShadow:'0 1px 4px rgba(0,0,0,.2)',
            }}/>
          </div>
          Open now
        </label>

        {/* Sort */}
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
          style={{padding:'10px 14px',background:'var(--gray-1)',border:'none',borderRadius:10,fontSize:'.9rem',cursor:'pointer',color:'var(--text)'}}>
          <option value="distance">Sort: Distance</option>
          <option value="rating">Sort: Rating</option>
          <option value="reviews">Sort: Reviews</option>
        </select>

        {/* View toggle */}
        <div style={{display:'flex',gap:4,background:'var(--gray-1)',borderRadius:10,padding:4,marginLeft:'auto'}}>
          {[
            { v:'list', icon:'☰', label:'List' },
            { v:'split', icon:'⊞', label:'Split' },
            { v:'map', icon:'🗺', label:'Map' },
          ].map(opt => (
            <button key={opt.v} onClick={()=>setView(opt.v)} style={{
              padding:'7px 14px', borderRadius:8,
              fontSize:'.82rem', fontWeight:500,
              background: view===opt.v ? 'white' : 'transparent',
              color: view===opt.v ? 'var(--navy)' : 'var(--gray-3)',
              boxShadow: view===opt.v ? '0 2px 8px rgba(0,0,0,.08)' : 'none',
              transition:'all .2s',
            }}>{opt.icon} {opt.label}</button>
          ))}
        </div>
      </div>

      {/* Results count */}
      <div style={{padding:'10px 32px',background:'var(--cream)',borderBottom:'1px solid var(--gray-2)',fontSize:'.82rem',color:'var(--gray-3)'}}>
        <strong style={{color:'var(--navy)'}}>{filtered.length}</strong> osteopaths found
        {search && <> near <strong style={{color:'var(--teal)'}}>{search}</strong></>}
        {speciality && <> specialising in <strong style={{color:'var(--teal)'}}>{speciality}</strong></>}
      </div>

      {/* Main content */}
      <div style={{flex:1,display:'flex',overflow:'hidden',minHeight:0}}>
        {/* List */}
        {(view==='list'||view==='split') && (
          <div style={{
            width: view==='split' ? 420 : '100%',
            overflowY:'auto',
            padding:20,
            display:'flex', flexDirection:'column', gap:12,
            borderRight: view==='split' ? '1px solid var(--gray-2)' : 'none',
          }}>
            {filtered.length === 0 ? (
              <div style={{textAlign:'center',padding:'60px 20px',color:'var(--gray-3)'}}>
                <div style={{fontSize:'2.5rem',marginBottom:12}}>🔍</div>
                <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:'1.3rem',color:'var(--navy)',marginBottom:8}}>No clinics found</div>
                <p style={{fontSize:'.875rem'}}>Try adjusting your filters or expanding the search radius.</p>
              </div>
            ) : filtered.map((clinic, i) => (
              <ClinicCard key={clinic.id} clinic={clinic}
                active={selectedId===clinic.id}
                onSelect={setSelectedId}
                index={i}/>
            ))}
          </div>
        )}

        {/* Map */}
        {(view==='map'||view==='split') && (
          <div style={{flex:1,padding:16,minWidth:0}}>
            <MapView clinics={filtered} selectedId={selectedId} onSelect={setSelectedId}/>
          </div>
        )}
      </div>
    </div>
  );
}

function Stars({ rating, size='.95rem' }) {
  return (
    <span style={{display:'inline-flex',gap:2}}>
      {[1,2,3,4,5].map(i=>(
        <span key={i} style={{color:i<=Math.round(rating)?'#f59e0b':'var(--gray-2)',fontSize:size}}>★</span>
      ))}
    </span>
  );
}

              transition:'all .2s',

        </div>

      {bookingOpen && <BookingModal clinic={clinic} onClose={()=>setBookingOpen(false)}/>}

  );
}

function Stars({ rating }) {
  return (
    <span style={{display:'inline-flex',gap:2}}>
      {[1,2,3,4,5].map(i=>(
        <span key={i} style={{color:i<=Math.round(rating)?'#f59e0b':'var(--gray-2)',fontSize:'.85rem'}}>★</span>
      ))}
    </span>
  );
}

              { icon:'🔄', title:'Joint Articulation', body:'Passive movement of joints through their natural range of motion to improve mobility and reduce stiffness.' },

              { icon:'🏃', title:'Functional Techniques', body:'Indirect techniques that guide the body into positions of ease to allow tissues to unwind naturally without force.' },

                <p style={{fontSize:'.85rem',lineHeight:1.65,color:'var(--gray-4)'}}>{t.body}</p>
              </div>

          </div>
        </div>
      </section>

      {/* CTA */}
      <section style={{background:'linear-gradient(135deg,var(--teal),var(--navy))',padding:'80px 48px',textAlign:'center'}}>

    </div>
